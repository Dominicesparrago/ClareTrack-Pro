<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClareTrack Pro</title>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:system-ui,sans-serif; background:#1a2744; color:white; }
    .spinner { width:40px; height:40px; border:4px solid rgba(255,255,255,0.2); border-top-color:#f5a623; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <script>
    fetch('/api/auth/me', { credentials: 'include' })
      .then(r => r.json())
      .then(user => {
        const pages = { ADMIN: '/dashboard-admin.html', TEACHER: '/dashboard-teacher.html', STUDENT: '/dashboard-student.html' };
        window.location.replace(pages[user.role] || '/login.html');
      })
      .catch(() => window.location.replace('/login.html'));
  </script>
</body>
</html>
